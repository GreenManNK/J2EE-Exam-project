spring.application.name=LucKhaiKietTuan3

# ============================================
# Database Configuration for Laragon 2.1.2
# ============================================
# OPTION 1: H2 Database (Default - để test nhanh, không cần Laragon)
spring.datasource.url=jdbc:h2:file:./data/hutechdb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# OPTION 2: MySQL 8 via Laragon 2.1.2 (Uncomment các dòng dưới để dùng Laragon MySQL)
# Yêu cầu: Khởi động Laragon trước (C:\laragon\laragon.exe -> Start All)
#spring.datasource.url=jdbc:mysql://localhost:3360/hutech?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
#spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
#spring.datasource.username=root
#spring.datasource.password=
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
#spring.h2.console.enabled=false

# ============================================
# JPA/Hibernate Configuration (chung cho cả 2)
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# Server Configuration
server.port=8083
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Facebook Login (optional)
# Tao Facebook App va dien cac gia tri ben duoi de bat login Facebook
app.auth.facebook.client-id=
app.auth.facebook.client-secret=
app.auth.facebook.redirect-uri=http://localhost:8083/auth/facebook/callback
