<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don Hang</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .page-alert {
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .page-alert.success {
            background: #ecfdf3;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
        .page-alert.error {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }
    </style>
</head>
<body class="tgdd-page-body">
<th:block th:replace="~{fragments/tgdd-shell :: siteHeader}"></th:block>

<main class="tgdd-main">
    <div class="tgdd-container">
        <div class="tgdd-page-head">
            <h1 class="tgdd-page-title">
                <i class="fas fa-file-invoice"></i>
                <span th:text="${isOrderAdmin ? 'Quan ly don hang' : 'Don hang cua ban'}">Don hang</span>
            </h1>
            <a th:if="${isOrderAdmin}" class="tgdd-btn tgdd-btn-primary" href="/orders/add"><i class="fas fa-plus"></i> Tao don moi</a>
        </div>

        <div th:if="${successMessage}" class="page-alert success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="page-alert error" th:text="${errorMessage}"></div>

        <div class="tgdd-card" style="padding: 12px;">
            <table class="tgdd-table">
                <thead>
                <tr>
                    <th>Ma don</th>
                    <th>Khach hang</th>
                    <th>Dien thoai</th>
                    <th>San pham</th>
                    <th>Tong tien</th>
                    <th>Trang thai</th>
                    <th style="width:220px;">Hanh dong</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="order : ${orders}">
                    <td th:text="'#' + ${order.id}">#1</td>
                    <td th:text="${order.customerName}">Khach</td>
                    <td th:text="${order.phone}">0900</td>
                    <td>
                        <div th:if="${#lists.isEmpty(order.orderDetails)}" style="color:#6b7280;">Khong co chi tiet</div>
                        <div th:each="detail : ${order.orderDetails}" style="font-size:13px; line-height:1.45;">
                            <span th:text="${#strings.isEmpty(detail.productName) ? (detail.product != null ? detail.product.name : 'San pham') : detail.productName}">San pham</span>
                            <span th:text="${' x' + detail.quantity}">x1</span>
                        </div>
                    </td>
                    <td th:text="'₫' + ${#numbers.formatInteger(order.totalPrice, 0, 'DEFAULT')}">₫0</td>
                    <td th:text="${order.status}">pending</td>
                    <td style="display:flex; gap:8px;">
                        <a class="tgdd-btn tgdd-btn-light" th:href="@{/orders/{id}(id=${order.id})}">
                            <i class="fas fa-eye"></i> Chi tiet
                        </a>
                        <a th:if="${isOrderAdmin}" class="tgdd-btn tgdd-btn-light" th:href="@{/orders/edit/{id}(id=${order.id})}">
                            <i class="fas fa-pen"></i> Sua
                        </a>
                        <a th:if="${isOrderAdmin}" class="tgdd-btn tgdd-btn-primary" th:href="@{/orders/delete/{id}(id=${order.id})}"
                           onclick="return confirm('Ban chac chan muon xoa don hang nay?')">
                            <i class="fas fa-trash"></i> Xoa
                        </a>
                        <form th:if="${!isOrderAdmin and (order.status == 'pending' or order.status == 'processing')}"
                              th:action="@{/orders/{id}/cancel(id=${order.id})}" method="post">
                            <button class="tgdd-btn tgdd-btn-primary" type="submit"
                                    onclick="return confirm('Ban chac chan muon huy don hang nay?')">
                                <i class="fas fa-ban"></i> Huy
                            </button>
                        </form>
                        <span th:unless="${isOrderAdmin or order.status == 'pending' or order.status == 'processing'}"
                              style="color:#6b7280; font-size:13px;">Da dat</span>
                    </td>
                </tr>
                <tr th:if="${orders.isEmpty()}">
                    <td colspan="7" class="tgdd-empty">Chua co don hang nao.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/tgdd-shell :: siteFooter}"></th:block>
    <script src="/js/script.js"></script>
</body>
</html>
