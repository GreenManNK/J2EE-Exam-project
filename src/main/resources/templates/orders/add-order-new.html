<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm Đơn Hàng - Thế Giới Di Động</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --tgdd-red: #d70018;
            --tgdd-yellow: #ffd700;
            --tgdd-gray: #888;
            --tgdd-light-gray: #f5f5f5;
            --tgdd-border: #e0e0e0;
            --text-primary: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--tgdd-light-gray);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .header {
            background: var(--tgdd-red);
            color: white;
            padding: 1rem 0;
            margin-bottom: 2rem;
        }

        .header-content {
            max-width: 700px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .header h1 {
            color: white;
            font-size: 1.5rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        main {
            max-width: 700px;
            margin: 0 auto;
            padding: 0 1rem 3rem;
        }

        .form-container {
            background: white;
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-weight: 600;
            color: var(--tgdd-red);
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .form-control,
        .form-select {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid var(--tgdd-border);
            border-radius: 6px;
            font-size: 0.9rem;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-control:focus,
        .form-select:focus {
            outline: none;
            border-color: var(--tgdd-red);
            box-shadow: 0 0 8px rgba(215, 0, 24, 0.2);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--tgdd-border);
        }

        .btn {
            flex: 1;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .btn-submit {
            background: var(--tgdd-red);
            color: white;
        }

        .btn-submit:hover {
            background: #b80015;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(215, 0, 24, 0.3);
        }

        .btn-cancel {
            background: #757575;
            color: white;
        }

        .btn-cancel:hover {
            background: #616161;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .form-actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-content">
            <h1><i class="fas fa-plus-circle"></i> Thêm Đơn Hàng</h1>
        </div>
    </div>

    <main>
        <div class="form-container">
            <form th:action="@{/orders/add}" th:object="${order}" method="post">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="customerName">Tên Khách Hàng <span style="color: red;">*</span></label>
                        <input type="text" class="form-control" id="customerName" th:field="*{customerName}" placeholder="Nhập tên khách hàng" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="phone">Số Điện Thoại <span style="color: red;">*</span></label>
                        <input type="tel" class="form-control" id="phone" th:field="*{phone}" placeholder="Nhập số điện thoại" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="address">Địa Chỉ <span style="color: red;">*</span></label>
                    <input type="text" class="form-control" id="address" th:field="*{address}" placeholder="Nhập địa chỉ giao hàng" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="notes">Ghi Chú</label>
                    <textarea class="form-control" id="notes" th:field="*{notes}" placeholder="Nhập ghi chú đơn hàng" rows="3" style="resize: vertical;"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="totalPrice">Tổng Tiền <span style="color: red;">*</span></label>
                        <input type="number" class="form-control" id="totalPrice" th:field="*{totalPrice}" placeholder="0" min="0" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="status">Trạng Thái <span style="color: red;">*</span></label>
                        <select class="form-select" id="status" th:field="*{status}" required>
                            <option value="">-- Chọn Trạng Thái --</option>
                            <option value="pending">Chờ Xác Nhận</option>
                            <option value="processing">Đang Xử Lý</option>
                            <option value="shipped">Đã Gửi</option>
                            <option value="delivered">Đã Giao</option>
                            <option value="cancelled">Hủy</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-submit">
                        <i class="fas fa-save"></i> Thêm Đơn Hàng
                    </button>
                    <a href="/orders" class="btn btn-cancel">
                        <i class="fas fa-times"></i> Hủy Bỏ
                    </a>
                </div>
            </form>
        </div>
    </main>
    <script src="/js/script.js"></script>
</body>
</html>
