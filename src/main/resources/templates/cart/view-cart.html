<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gio Hang</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .cart-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 16px;
        }
        .cart-card, .summary-card {
            padding: 16px;
        }
        .cart-item {
            display: grid;
            grid-template-columns: 90px 1fr auto;
            gap: 12px;
            align-items: center;
            border-bottom: 1px solid #e5e7eb;
            padding: 12px 0;
        }
        .thumb {
            height: 90px;
            border-radius: 8px;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #9ca3af;
            font-size: 26px;
            overflow: hidden;
        }
        .thumb img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #fff;
        }
        .line-price {
            color: #d70018;
            font-weight: 700;
        }
        .qty-box {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .qty-box input {
            width: 72px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 7px 8px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e5e7eb;
        }
        .summary-total {
            font-size: 20px;
            font-weight: 800;
            color: #d70018;
            padding-top: 12px;
        }
        .cart-alert {
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .cart-alert.success {
            background: #ecfdf3;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
        .cart-alert.error {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }
        .summary-actions {
            display: grid;
            gap: 8px;
            margin-top: 12px;
        }
        .summary-actions form {
            margin: 0;
        }
        @media (max-width: 900px) {
            .cart-layout {
                grid-template-columns: 1fr;
            }
            .cart-item {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="tgdd-page-body">
<th:block th:replace="~{fragments/tgdd-shell :: siteHeader}"></th:block>

<main class="tgdd-main">
    <div class="tgdd-container">
        <div class="tgdd-page-head">
            <h1 class="tgdd-page-title"><i class="fas fa-cart-shopping"></i> Gio hang cua ban</h1>
            <a class="tgdd-btn tgdd-btn-light" href="/products"><i class="fas fa-arrow-left"></i> Tiep tuc mua</a>
        </div>

        <div th:if="${successMessage}" class="cart-alert success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="cart-alert error" th:text="${errorMessage}"></div>

        <div class="cart-layout">
            <div class="tgdd-card cart-card">
                <div th:if="${#lists.isEmpty(cart?.items)}" class="tgdd-empty">
                    <i class="fas fa-inbox" style="font-size: 40px;"></i>
                    <p>Gio hang dang trong.</p>
                </div>

                <div th:each="item : ${cart?.items}" class="cart-item">
                    <div class="thumb">
                        <img th:if="${item.product.imageUrl != null and !#strings.isEmpty(item.product.imageUrl)}"
                             th:src="${item.product.imageUrl}" th:alt="${item.product.name}">
                        <i th:unless="${item.product.imageUrl != null and !#strings.isEmpty(item.product.imageUrl)}"
                           class="fas fa-image"></i>
                    </div>
                    <div>
                        <div style="font-weight:700;" th:text="${item.product.name}">Ten san pham</div>
                        <div style="color:#6b7280; font-size:13px;" th:text="${item.product.category != null ? item.product.category.name : 'Khong danh muc'}">Danh muc</div>
                        <div class="line-price" th:text="'₫' + ${#numbers.formatInteger(item.product.price, 0, 'DEFAULT')}">₫0</div>
                    </div>
                    <div>
                        <form th:action="@{/cart/update/{id}(id=${item.id})}" method="post" class="qty-box">
                            <input type="number" name="quantity" th:value="${item.quantity}" min="1">
                            <button class="tgdd-btn tgdd-btn-light" type="submit">Cap nhat</button>
                        </form>
                        <form th:action="@{/cart/remove/{id}(id=${item.id})}" method="post" style="margin-top:8px;">
                            <button class="tgdd-btn tgdd-btn-primary" type="submit"><i class="fas fa-trash"></i> Xoa</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="tgdd-card summary-card" th:if="${not #lists.isEmpty(cart?.items)}">
                <h3 style="margin-top:0;">Tong ket don hang</h3>
                <div class="summary-row"><span>Tam tinh</span><span th:text="'₫' + ${#numbers.formatInteger(totalPrice, 0, 'DEFAULT')}">₫0</span></div>
                <div class="summary-row"><span>Phi van chuyen</span><span>₫0</span></div>
                <div class="summary-row summary-total"><span>Tong cong</span><span th:text="'₫' + ${#numbers.formatInteger(totalPrice, 0, 'DEFAULT')}">₫0</span></div>
                <p th:if="${guestMode}" style="margin: 10px 0 0; color:#b91c1c; font-size:13px;">
                    Ban co the them gio hang khi chua dang nhap. De thanh toan, vui long dang nhap.
                </p>
                <div class="summary-actions">
                    <form th:action="@{/cart/checkout}" method="post">
                        <button class="tgdd-btn tgdd-btn-primary" style="width:100%;" type="submit">
                            <i class="fas fa-credit-card"></i>
                            <span th:text="${guestMode ? 'Dang nhap de thanh toan' : 'Dat hang ngay'}">Dat hang ngay</span>
                        </button>
                    </form>
                    <form th:action="@{/cart/clear}" method="post">
                        <button class="tgdd-btn tgdd-btn-light" style="width:100%;" type="submit">
                            <i class="fas fa-trash"></i> Xoa toan bo gio
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/tgdd-shell :: siteFooter}"></th:block>
    <script src="/js/script.js"></script>
</body>
</html>
