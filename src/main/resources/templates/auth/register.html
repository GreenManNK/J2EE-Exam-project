<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dang Ky</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .auth-wrap {
            max-width: 680px;
            margin: 0 auto;
            padding: 20px;
        }
        .auth-card {
            padding: 20px;
        }
        .auth-title {
            margin: 0 0 8px;
            font-size: 26px;
        }
        .auth-sub {
            margin: 0 0 16px;
            color: #6b7280;
            font-size: 14px;
        }
        .auth-error {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .auth-bottom {
            margin-top: 12px;
            color: #6b7280;
            font-size: 14px;
            text-align: center;
        }
        .auth-bottom a {
            color: #d70018;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body class="tgdd-page-body">
<th:block th:replace="~{fragments/tgdd-shell :: siteHeader}"></th:block>

<main class="tgdd-main">
    <div class="tgdd-container">
        <div class="auth-wrap">
            <div class="tgdd-card auth-card">
                <h1 class="auth-title">Dang ky tai khoan</h1>
                <p class="auth-sub">Tao tai khoan moi de nhan uu dai va theo doi don hang.</p>

                <div th:if="${error}" class="auth-error" th:text="${error}"></div>

                <form method="post" th:action="@{/auth/register}" th:object="${user}">
                    <div class="tgdd-form-grid">
                        <div class="tgdd-form-group">
                            <label for="username">Ten dang nhap</label>
                            <input id="username" th:field="*{username}" type="text" required>
                        </div>
                        <div class="tgdd-form-group">
                            <label for="email">Email</label>
                            <input id="email" th:field="*{email}" type="email" required>
                        </div>
                    </div>

                    <div class="tgdd-form-grid">
                        <div class="tgdd-form-group">
                            <label for="fullName">Ho va ten</label>
                            <input id="fullName" th:field="*{fullName}" type="text">
                        </div>
                        <div class="tgdd-form-group">
                            <label for="phone">So dien thoai</label>
                            <input id="phone" th:field="*{phone}" type="text">
                        </div>
                    </div>

                    <div class="tgdd-form-grid">
                        <div class="tgdd-form-group">
                            <label for="password">Mat khau</label>
                            <input id="password" th:field="*{password}" type="password" required>
                        </div>
                        <div class="tgdd-form-group">
                            <label for="confirmPassword">Xac nhan mat khau</label>
                            <input id="confirmPassword" name="confirmPassword" type="password" required>
                        </div>
                    </div>

                    <div class="tgdd-form-grid">
                        <div class="tgdd-form-group">
                            <label for="address">Dia chi</label>
                            <input id="address" th:field="*{address}" type="text">
                        </div>
                    </div>

                    <button class="tgdd-btn tgdd-btn-primary" type="submit">
                        <i class="fas fa-user-plus"></i> Tao tai khoan
                    </button>
                </form>

                <div class="auth-bottom">
                    Da co tai khoan?
                    <a href="/auth/login">Dang nhap ngay</a>
                </div>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/tgdd-shell :: siteFooter}"></th:block>
    <script src="/js/script.js"></script>
</body>
</html>
