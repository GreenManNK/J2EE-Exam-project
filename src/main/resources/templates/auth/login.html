<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dang Nhap</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .auth-wrap {
            max-width: 460px;
            margin: 0 auto;
            padding: 20px;
        }
        .auth-card {
            padding: 20px;
        }
        .auth-title {
            margin: 0 0 8px;
            font-size: 26px;
        }
        .auth-sub {
            margin: 0 0 16px;
            color: #6b7280;
            font-size: 14px;
        }
        .auth-error {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .auth-success {
            background: #ecfdf3;
            color: #166534;
            border: 1px solid #bbf7d0;
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .auth-bottom {
            margin-top: 12px;
            color: #6b7280;
            font-size: 14px;
            text-align: center;
        }
        .auth-bottom a {
            color: #d70018;
            font-weight: 700;
            text-decoration: none;
        }
        .auth-separator {
            text-align: center;
            color: #6b7280;
            margin: 12px 0;
            font-size: 13px;
        }
        .auth-fb-btn {
            width: 100%;
            justify-content: center;
            background: #1877f2;
            color: #fff !important;
            border-color: #1877f2;
        }
        .auth-fb-btn:hover {
            background: #1668d3;
            border-color: #1668d3;
        }
    </style>
</head>
<body class="tgdd-page-body">
<th:block th:replace="~{fragments/tgdd-shell :: siteHeader}"></th:block>

<main class="tgdd-main">
    <div class="tgdd-container">
        <div class="auth-wrap">
            <div class="tgdd-card auth-card">
                <h1 class="auth-title">Dang nhap</h1>
                <p class="auth-sub">Dang nhap bang ten dang nhap, email, so dien thoai hoac Facebook.</p>

                <div th:if="${successMessage}" class="auth-success" th:text="${successMessage}"></div>
                <div th:if="${error}" class="auth-error" th:text="${error}"></div>

                <form method="post" th:action="@{/auth/login}">
                    <div class="tgdd-form-group">
                        <label for="identifier">Ten dang nhap / Email / So dien thoai</label>
                        <input id="identifier" name="identifier" type="text" required>
                    </div>
                    <div class="tgdd-form-group">
                        <label for="password">Mat khau</label>
                        <input id="password" name="password" type="password" required>
                    </div>
                    <button class="tgdd-btn tgdd-btn-primary" type="submit">
                        <i class="fas fa-right-to-bracket"></i> Dang nhap
                    </button>
                </form>

                <div class="auth-separator">Hoac</div>
                <a class="tgdd-btn auth-fb-btn" href="/auth/facebook">
                    <i class="fab fa-facebook-f"></i> Dang nhap bang Facebook
                </a>

                <div class="auth-bottom">
                    Chua co tai khoan?
                    <a href="/auth/register">Dang ky ngay</a>
                </div>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/tgdd-shell :: siteFooter}"></th:block>
    <script src="/js/script.js"></script>
</body>
</html>
